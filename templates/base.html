{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ nombre_cine }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">{{ nombre_cine }}</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <li class="nav-item me-3"><a class="nav-link" href="{% url 'pelicula_list' %}">Cartelera</a></li>
                        <li class="nav-item me-4"><a class="nav-link" href="{% url 'funcion_list' %}">Tickets</a></li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'logout' %}" class="m-0">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-light btn-sm px-4">Salir</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item me-3"><a class="nav-link" href="{% url 'login' %}">Ingresar</a></li>
                        <li class="nav-item"><a class="btn btn-primary btn-sm px-4" href="{% url 'registro' %}">Registrarse</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5" style="min-height: 75vh;">
        {% block content %}{% endblock %}
    </div>
    <footer class="text-center pb-4 mt-5">
        <p class="mb-0 fw-bold">{{ footer_text }}</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
