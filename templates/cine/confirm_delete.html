{% extends 'base.html' %}
{% block content %}
<h2>Confirmar borrado</h2>
<p>Seguro que queres borrar "{{ object }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Si, borrar</button>
    <a href="javascript:history.back()" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
