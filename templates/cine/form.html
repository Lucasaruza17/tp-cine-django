{% extends 'base.html' %}
{% block content %}
<h2>Formulario</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="javascript:history.back()" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
